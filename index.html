<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATHN | Download</title>
    <style>
        :root { --accent: #ff5500; --bg: #000; --card: #0a0a0a; --grey: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--grey); text-align: center; }
        .artwork { width: 140px; height: 140px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--grey); }
        h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .track-sub { color: #555; font-size: 0.8rem; margin-bottom: 40px; text-transform: uppercase; }
        .step-row { display: flex; align-items: flex-start; margin-bottom: 25px; position: relative; text-align: left; }
        .step-row:not(:last-child)::after { content: ''; position: absolute; left: 17px; top: 40px; width: 1px; height: calc(100% - 10px); background: var(--grey); }
        .icon { width: 34px; height: 34px; background: var(--grey); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; font-size: 12px; font-weight: bold; border: 2px solid var(--bg); z-index: 2; }
        .btn { display: block; width: 100%; padding: 12px; border: 1px solid var(--grey); background: transparent; color: #fff; text-decoration: none; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; text-align: center; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid var(--grey); border-radius: 6px; color: #fff; outline: none; box-sizing: border-box; font-size: 13px; margin-top: 5px; }
        #msg { font-size: 11px; color: var(--accent); margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i1.sndcdn.com/artworks-T4Vf6p1V8XoE-0-t500x500.jpg" class="artwork">
    <h1>NATHN</h1>
    <div class="track-sub">Samuel Moriero [Industrial Edit]</div>

    <div class="step-row"><div class="icon">1</div><div style="flex:1"><a href="https://soundcloud.com/nathn-techno" target="_blank" class="btn">Follow SoundCloud</a></div></div>
    <div class="step-row"><div class="icon">2</div><div style="flex:1"><a href="https://soundcloud.com/nathn-techno/samuel-moriero-industrial-edit#comments" target="_blank" class="btn">Like & Comment</a></div></div>
    <div class="step-row"><div class="icon">3</div><div style="flex:1"><input type="text" id="sc-user" placeholder="SoundCloud Username"></div></div>
    <div class="step-row"><div class="icon">4</div><div style="flex:1"><input type="email" id="email" placeholder="Email Address"></div></div>
    <div class="step-row"><div class="icon">5</div><div style="flex:1">
        <button class="btn" style="background:#fff; color:#000;" id="main-btn" onclick="verify()">Verify & Download</button>
        <div id="msg">CHECKING...</div>
    </div></div>
</div>

<script>
    async function verify() {
        const user = document.getElementById('sc-user').value;
        const email = document.getElementById('email').value;
        const btn = document.getElementById('main-btn');
        const msg = document.getElementById('msg');

        if(!user || !email.includes('@')) { alert("Fill all fields"); return; }

        btn.innerText = "VERIFYING...";
        msg.style.display = "block";
        msg.innerText = "Searching for your comment...";

        try {
            const response = await fetch('https://eoobcjspcppb2jy.m.pipedream.net', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sc_user: user, email: email })
            });
            const data = await response.json();

            if(data.verified) {
                btn.style.background = "#1db954"; btn.innerText = "VERIFIED!";
                window.location.href = data.download_url;
            } else {
                btn.innerText = "VERIFY & DOWNLOAD";
                msg.innerText = data.message;
            }
        } catch (e) { msg.innerText = "Connection error. Try again."; }
    }
</script>
</body>
</html>
