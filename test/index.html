<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATHN | Verified Download</title>
    <style>
        :root { --accent: #ff5500; --bg: #000; --card: #0a0a0a; --grey: #222; --success: #1db954; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 0; }
        .container { width: 90%; max-width: 420px; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--grey); text-align: center; }
        .top-artwork { width: 100%; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--grey); }
        .promo-badge { background: var(--accent); color: #fff; font-size: 9px; font-weight: bold; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .track-sub { color: #666; font-size: 0.8rem; margin-bottom: 40px; text-transform: uppercase; }
        .step-row { display: flex; align-items: flex-start; margin-bottom: 30px; position: relative; text-align: left; }
        .step-row:not(:last-child)::after { content: ''; position: absolute; left: 19px; top: 40px; width: 2px; height: calc(100% - 10px); background: var(--grey); }
        .icon { width: 38px; height: 38px; background: var(--grey); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px; flex-shrink: 0; z-index: 2; border: 3px solid var(--bg); font-size: 12px; font-weight: bold; }
        .active .icon { background: var(--accent); }
        .completed .icon { background: var(--success); }
        .btn { display: block; width: 100%; padding: 12px; border: 1px solid var(--grey); border-radius: 8px; background: transparent; color: #fff; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; text-decoration: none; text-align: center; }
        .btn.disabled { opacity: 0.4; pointer-events: none; }
        input { width: 100%; padding: 12px; border: 1px solid var(--grey); border-radius: 8px; background: #111; color: #fff; margin-top: 5px; box-sizing: border-box; }
        #msg { font-size: 11px; color: var(--accent); margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i1.sndcdn.com/artworks-cjZOWSbn0TygOyym-bTcrKw-t1080x1080.png" class="top-artwork">
    <div class="promo-badge">Free Download</div>
    <h1>NATHN</h1>
    <div class="track-sub">HIT 'EM</div>

    <div class="step-row active" id="s1">
        <div class="icon">1</div>
        <div style="flex:1"><button class="btn" id="btn-1" onclick="startConnect()">Connect SoundCloud</button></div>
    </div>

    <div class="step-row" id="s2">
        <div class="icon">2</div>
        <div style="flex:1"><a href="https://www.instagram.com/nathn.techno" target="_blank" class="btn disabled" id="btn-2" onclick="done(2)">Follow on Instagram</a></div>
    </div>

    <div class="step-row" id="s4">
        <div class="icon">3</div>
        <div style="flex:1"><input type="email" id="email" placeholder="Email Address" disabled></div>
    </div>

    <div class="step-row" id="s6">
        <div class="icon">4</div>
        <div style="flex:1">
            <button class="btn" id="main-btn" style="background:#fff; color:#000; opacity: 0.5;" onclick="verify()" disabled>Verify & Download</button>
            <div id="msg">CHECKING AUTHENTICATION...</div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        clientId: "5ChG6y33NgVn7MfiTrHOUoo35Dz1XDLf",
        clientSecret: "byvbwYQR6rq0Fqbr0aGukJflKUGdojBo",
        redirectUri: "https://poolmedia.nl", // MUST MATCH THE BOX IN YOUR SCREENSHOT
        myUserId: "279262234", 
        downloadUrl: "https://drive.google.com/uc?export=download&id=1IbhMmKd8yfYrUPP-AmjV2wgNm1mipJIV"
    };

    function startConnect() {
        const authUrl = `https://secure.soundcloud.com/authorize?client_id=${CONFIG.clientId}&redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&response_type=code&display=popup`;
        const win = window.open(authUrl, "SCAuth", "width=450,height=600");
        document.getElementById('btn-1').innerText = "WAITING FOR LOGIN...";

        const checkWin = setInterval(() => {
            try {
                if (win.location.search.includes("code=")) {
                    const code = new URLSearchParams(win.location.search).get("code");
                    win.close();
                    clearInterval(checkWin);
                    // In a simple gate, we don't even need to exchange the code for a token 
                    // to verify they clicked it. We just progress them!
                    done(1);
                }
            } catch (e) {}
            if (win.closed) clearInterval(checkWin);
        }, 1000);
    }

    function done(n) {
        const currentBtn = document.getElementById(n === 1 ? 'btn-1' : 'btn-2');
        currentBtn.innerText = "SUCCESSFUL";
        currentBtn.style.background = "var(--success)";
        
        document.getElementById(`s${n}`).classList.replace('active', 'completed');
        if (n === 1) {
            document.getElementById('s2').classList.add('active');
            document.getElementById('btn-2').classList.remove('disabled');
        } else if (n === 2) {
            document.getElementById('s4').classList.add('active');
            document.getElementById('email').disabled = false;
            document.getElementById('main-btn').disabled = false;
            document.getElementById('main-btn').style.opacity = "1";
        }
    }

    function verify() {
        const btn = document.getElementById('main-btn');
        btn.innerText = "VERIFYING...";
        document.getElementById('msg').style.display = "block";
        setTimeout(() => {
            btn.style.background = "var(--success)";
            btn.innerText = "STARTING DOWNLOAD...";
            window.location.href = CONFIG.downloadUrl;
        }, 2000);
    }
</script>
</body>
</html>
