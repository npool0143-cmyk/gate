<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATHN | Verified Download</title>
    <style>
        :root { --accent: #ff5500; --bg: #000; --card: #0a0a0a; --grey: #222; --success: #1db954; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 420px; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--grey); text-align: center; }
        .top-artwork { width: 100%; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--grey); }
        h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0 0 5px 0; }
        .track-sub { color: #666; font-size: 0.8rem; margin-bottom: 25px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; text-transform: uppercase; color: #888; margin-left: 5px; }
        textarea { width: 100%; padding: 12px; border: 1px solid var(--grey); border-radius: 8px; background: #111; color: #fff; box-sizing: border-box; resize: none; font-family: inherit; margin-top: 5px; }
        
        .btn-sc { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-sc:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-sc:disabled { background: var(--grey); cursor: not-allowed; }
        
        #status { font-size: 11px; color: var(--accent); margin-top: 15px; font-weight: bold; display: none; }
        .verify-steps { font-size: 10px; color: #555; margin-top: 20px; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i1.sndcdn.com/artworks-cjZOWSbn0TygOyym-bTcrKw-t1080x1080.png" class="top-artwork">
    <h1>NATHN</h1>
    <div class="track-sub">HIT 'EM (Original Mix)</div>

    <div class="input-group">
        <label>Share a comment on SoundCloud to unlock</label>
        <textarea id="user-comment" rows="2" placeholder="Sick track! 🔥"></textarea>
    </div>

    <button class="btn-sc" id="main-btn" onclick="startGate()">
        Connect & Download
    </button>

    <div id="status">PROCESSING ACTIONS...</div>

    <div class="verify-steps">
        <span>✓ Follow</span>
        <span>✓ Like</span>
        <span>✓ Repost</span>
        <span>✓ Comment</span>
    </div>
</div>

<script>
    const CONFIG = {
        clientId: "5ChG6y33NgVn7MfiTrHOUoo35Dz1XDLf",
        redirectUri: "https://gate.poolmedia.nl",
        myUserId: "279262234",  // NATHN User ID
        trackId: "2101976640",  // HIT 'EM Track ID
        downloadUrl: "https://drive.google.com/uc?export=download&id=1IbhMmKd8yfYrUPP-AmjV2wgNm1mipJIV"
    };

    function startGate() {
        const comment = document.getElementById('user-comment').value.trim();
        if (comment.length < 3) {
            alert("Please write a short comment first!");
            return;
        }

        const authUrl = `https://secure.soundcloud.com/authorize?client_id=${CONFIG.clientId}&redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&response_type=token&display=popup`;
        const win = window.open(authUrl, "SCAuth", "width=450,height=600");

        const checkWin = setInterval(() => {
            try {
                if (win.location.hash.includes("access_token")) {
                    const params = new URLSearchParams(win.location.hash.replace("#", "?"));
                    const token = params.get("access_token");
                    win.close();
                    clearInterval(checkWin);
                    executeActions(token, comment);
                }
            } catch (e) {}
            if (win.closed) clearInterval(checkWin);
        }, 1000);
    }

    async function executeActions(token, commentText) {
        const btn = document.getElementById('main-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "AUTHENTICATED";
        status.style.display = "block";

        const headers = { 'Authorization': `OAuth ${token}`, 'Content-Type': 'application/json' };

        try {
            // 1. Follow NATHN
            status.innerText = "FOLLOWING NATHN...";
            await fetch(`https://api.soundcloud.com/me/followings/${CONFIG.myUserId}`, { method: 'PUT', headers });

            // 2. Like the Track
            status.innerText = "LIKING TRACK...";
            await fetch(`https://api.soundcloud.com/me/favorites/${CONFIG.trackId}`, { method: 'PUT', headers });

            // 3. Repost the Track
            status.innerText = "REPOSTING...";
            await fetch(`https://api.soundcloud.com/me/track_reposts/${CONFIG.trackId}`, { method: 'PUT', headers });

            // 4. Post the Comment
            status.innerText = "POSTING COMMENT...";
            await fetch(`https://api.soundcloud.com/tracks/${CONFIG.trackId}/comments`, {
                method: 'POST',
                headers,
                body: JSON.stringify({ comment: { body: commentText } })
            });

            // SUCCESS
            status.style.color = "var(--success)";
            status.innerText = "VERIFIED! STARTING DOWNLOAD...";
            btn.style.background = "var(--success)";
            btn.innerText = "SUCCESSFUL";

            setTimeout(() => {
                window.location.href = CONFIG.downloadUrl;
            }, 1500);

        } catch (err) {
            console.error(err);
            status.innerText = "ERROR BUT PROCEEDING TO DOWNLOAD...";
            setTimeout(() => { window.location.href = CONFIG.downloadUrl; }, 2000);
        }
    }
</script>
</body>
</html>
