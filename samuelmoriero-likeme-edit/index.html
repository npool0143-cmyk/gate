<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATHN | Verified Download</title>
    <style>
        :root { --accent: #ff5500; --bg: #000; --card: #0a0a0a; --grey: #222; --success: #1db954; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { width: 90%; max-width: 420px; background: var(--card); padding: 40px 30px; border-radius: 16px; border: 1px solid var(--grey); box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
        .artwork { width: 140px; height: 140px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--grey); object-fit: cover; }
        h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .track-sub { color: #666; font-size: 0.8rem; margin-bottom: 40px; text-transform: uppercase; }
        .step-row { display: flex; align-items: flex-start; margin-bottom: 30px; position: relative; text-align: left; }
        .step-row:not(:last-child)::after { content: ''; position: absolute; left: 19px; top: 40px; width: 2px; height: calc(100% - 10px); background: var(--grey); z-index: 1; }
        .icon { width: 38px; height: 38px; background: var(--grey); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px; flex-shrink: 0; z-index: 2; position: relative; border: 3px solid var(--bg); font-size: 12px; font-weight: bold; }
        .active .icon { background: var(--accent); box-shadow: 0 0 15px rgba(255,85,0,0.3); }
        .completed .icon { background: var(--success); }
        .btn { display: block; width: 100%; padding: 12px; border: 1px solid var(--grey); border-radius: 8px; background: transparent; color: #fff; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; text-decoration: none; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid var(--grey); border-radius: 8px; background: #111; color: #fff; box-sizing: border-box; outline: none; margin-top: 5px; font-size: 13px; }
        #msg { font-size: 10px; color: var(--accent); margin-top: 8px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i1.sndcdn.com/artworks-JGxvC0RKvlMFJsWo-9FdMrw-t1080x1080.jpg" class="artwork" id="artwork-img">
    <h1 id="artist-name">NATHN</h1>
    <div class="track-sub" id="track-name">Samuel Moriero [Industrial Edit]</div>

    <div class="step-row active" id="s1">
        <div class="icon">1</div>
        <div style="flex:1"><a href="https://soundcloud.com/nathn-techno" id="follow-link" target="_blank" class="btn" onclick="done(1)">Follow on SoundCloud</a></div>
    </div>

    <div class="step-row" id="s2">
        <div class="icon">2</div>
        <div style="flex:1"><a href="https://soundcloud.com/nathn-techno/samuel-moriero-industrial-edit#comments" id="comment-link" target="_blank" class="btn" onclick="done(2)">Like & Comment</a></div>
    </div>

    <div class="step-row" id="s3">
        <div class="icon">3</div>
        <div style="flex:1"><input type="text" id="sc-user" placeholder="SoundCloud Username"></div>
    </div>

    <div class="step-row" id="s4">
        <div class="icon">4</div>
        <div style="flex:1"><input type="email" id="email" placeholder="Email Address"></div>
    </div>

    <div class="step-row" id="s5">
        <div class="icon">5</div>
        <div style="flex:1">
            <button class="btn" id="main-btn" style="background:#fff; color:#000;" onclick="verify()">Verify & Download</button>
            <div id="msg">CHECKING... PLEASE WAIT</div>
        </div>
    </div>
</div>

<script>
    /* --- CONFIGURATION --- */
    const CONFIG = {
        trackId: "2281994480",
        commentUrl: "https://soundcloud.com/nathn-techno/samuel-moriero-industrial-edit#comments",
        artwork: "https://i1.sndcdn.com/artworks-T4Vf6p1V8XoE-0-t500x500.jpg",
        title: "Samuel Moriero [Industrial Edit]"
    };

    // Apply config
    document.getElementById('artwork-img').src = CONFIG.artwork;
    document.getElementById('track-name').innerText = CONFIG.title;
    document.getElementById('comment-link').href = CONFIG.commentUrl;

    // Start with inputs and verify button locked
    document.getElementById('sc-user').disabled = true;
    document.getElementById('email').disabled = true;
    document.getElementById('main-btn').disabled = true;
    document.getElementById('main-btn').style.opacity = "0.5";

    function done(n) {
        document.getElementById(`s${n}`).classList.replace('active', 'completed');
        const nextStep = document.getElementById(`s${n+1}`);
        
        if(nextStep) {
            nextStep.classList.add('active');
            
            // Logic to unlock inputs based on step
            if(n === 2) { // After step 2 (Like & Comment)
                document.getElementById('sc-user').disabled = false;
                document.getElementById('sc-user').focus();
            }
            if(n === 3) { // After entering username (if you add an onchange)
                 document.getElementById('email').disabled = false;
            }
        }
        
        // Final Unlock: If they've clicked both buttons, let them use the form
        if(n >= 2) {
            document.getElementById('sc-user').disabled = false;
            document.getElementById('email').disabled = false;
            document.getElementById('main-btn').disabled = false;
            document.getElementById('main-btn').style.opacity = "1";
        }
    }

    async function verify() {
        const user = document.getElementById('sc-user').value;
        const email = document.getElementById('email').value;
        const btn = document.getElementById('main-btn');
        const msg = document.getElementById('msg');

        if(!user || !email.includes('@')) { 
            alert("Please enter your SoundCloud name and a valid email."); 
            return; 
        }

        btn.innerText = "VERIFYING...";
        msg.style.display = "block";

        try {
            const res = await fetch('https://eoobcjspcppb2jy.m.pipedream.net', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    sc_user: user, 
                    email: email,
                    track_id: CONFIG.trackId 
                })
            });
            const data = await res.json();

            if(data.verified) {
                btn.style.background = "#1db954"; 
                btn.style.color = "#fff";
                btn.innerText = "VERIFIED";
                window.location.href = data.download_url;
            } else {
                btn.innerText = "TRY AGAIN";
                msg.innerText = data.message || "COMMENT NOT FOUND";
            }
        } catch (e) { 
            msg.innerText = "SERVER ERROR - TRY AGAIN"; 
        }
    }
</script>
</body>
</html>
